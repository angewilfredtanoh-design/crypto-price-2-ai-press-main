version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: docker/dev/Dockerfile
    container_name: crypto4-dev-app
    ports:
      - "8080:8080"
    volumes:
      # Monter le code source pour le développement en temps réel
      - ../../:/app
      # Volumes persistants pour les données
      - dev_data:/app/data
      - dev_logs:/app/logs
      - dev_cache:/app/cache
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - DB_FILE=/app/data/crypto_cache.db
    working_dir: /app
    command: php -S 0.0.0.0:8080 -t .
    healthcheck:
      test: ["CMD", "php", "-r", "require 'config.php'; echo 'OK';"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - crypto4-dev-network

  # Optionnel : phpMyAdmin pour visualiser la base SQLite
  # phpmyadmin:
  #   image: phpmyadmin/phpmyadmin
  #   container_name: crypto4-dev-phpmyadmin
  #   ports:
  #     - "8081:80"
  #   environment:
  #     - PMA_ABSOLUTE_URI=http://localhost:8081
  #   volumes:
  #     - dev_data:/app/data
  #   depends_on:
  #     - app
  #   networks:
  #     - crypto4-dev-network

volumes:
  dev_data:
    driver: local
  dev_logs:
    driver: local
  dev_cache:
    driver: local

networks:
  crypto4-dev-network:
    driver: bridge
