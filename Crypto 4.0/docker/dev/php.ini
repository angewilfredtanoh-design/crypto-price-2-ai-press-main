; php.ini - Environnement de Développement
; NEO CRYPTO DASH / Crypto 4.0

; =============================================================================
; AFFICHAGE DES ERREURS (DEV ONLY)
; =============================================================================
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; =============================================================================
; LOGS
; =============================================================================
error_log = /app/logs/php_error.log
ini_set("error_log", "/app/logs/php_error.log")

; =============================================================================
; MÉMOIRE & PERFORMANCE
; =============================================================================
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; =============================================================================
| POST & UPLOAD
; =============================================================================
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20

; =============================================================================
; FUSEAU HORAIRE
; =============================================================================
date.timezone = "UTC"

; =============================================================================
; EXTENSIONS
; =============================================================================
extension=pdo
extension=pdo_sqlite
extension=curl
extension=json

; =============================================================================
; OPCACHE (DÉSACTIVÉ EN DEV)
; =============================================================================
opcache.enable=0
opcache.enable_cli=0

; =============================================================================
; XDEBUG (OPTIONNEL - POUR DÉBOGAGE)
; =============================================================================
; zend_extension=xdebug
; xdebug.mode=develop,debug
; xdebug.start_with_request=yes
; xdebug.client_host=host.docker.internal
; xdebug.client_port=9003
; xdebug.log=/app/logs/xdebug.log
