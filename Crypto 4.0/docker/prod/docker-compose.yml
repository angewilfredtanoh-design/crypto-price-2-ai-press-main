version: '3.8'

services:
  app:
    build:
      context: ../..
      dockerfile: docker/prod/Dockerfile
    container_name: crypto4-prod-app
    ports:
      - "80:80"
    volumes:
      # Volumes persistants pour les données (NE PAS monter le code source en prod)
      - prod_data:/app/data
      - prod_logs:/app/logs
      - prod_cache:/app/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_FILE=/app/data/crypto_cache.db
      # À définir dans un fichier .env externe
      - MISTRAL_API_KEYS=${MISTRAL_API_KEYS:-}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - crypto4-prod-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

volumes:
  prod_data:
    driver: local
  prod_logs:
    driver: local
  prod_cache:
    driver: local

networks:
  crypto4-prod-network:
    driver: bridge
