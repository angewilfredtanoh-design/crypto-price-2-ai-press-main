global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus auto-surveillance
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Crypto 4.0 - Scraping depuis fichier (recommandé pour CLI)
  - job_name: 'crypto4_file'
    file_sd_configs:
      - files:
          - '/tmp/metrics.prom'
    scrape_interval: 15s
    metrics_path: /metrics
    
  # Crypto 4.0 - HTTP endpoint (si serveur web actif)
  - job_name: 'crypto4_http'
    static_configs:
      - targets: ['host.docker.internal:8080']
    scrape_interval: 30s
    metrics_path: /metrics
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+)'
        replacement: 'crypto4'

  # Node Exporter (métriques système)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts.yml"
